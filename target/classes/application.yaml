# ================================================================
# FinX24 — application.yml
# ================================================================

spring:
  application:
    name: FinX24

  profiles:
    active: dev

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: FinX24SuperSecretKeyThatIsAtLeast32CharactersLong2024CFSPL
  expiry-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.Finx24: DEBUG
    org.springframework.security: INFO

---
# ================================================================
# DEV PROFILE — H2 File-based (data survives restart ✅)
# ================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # ✅ FIX 1: file: instead of mem: — data saved to disk
    url: jdbc:h2:file:./data/finx24db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      # ✅ FIX 2: update instead of create-drop — schema preserved
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

---
# ================================================================
# PROD PROFILE — SQL Server
# ================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=FinX24DB;encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:YourPassword123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration